name: 🤖 Fraud Detection ML Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ml-pipeline-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  AWS_REGION: us-east-1
  S3_BUCKET: fraud-detection-dvc

jobs:
  ml-pipeline:
    # AWS/DVC steps require secrets; GitHub does not provide them to workflows from forks.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    steps:
      - name: ✅ Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: 📥 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🔐 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 📂 Pull data from S3 via DVC
        run: dvc pull

      - name: ⚙️ Run full pipeline (preprocess → train → evaluate)
        run: dvc repro

      - name: 📤 Push updated model to S3 via DVC
        run: dvc push

      - name: 📊 Upload evaluation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: model-reports
          path: reports/

      - name: ✅ Summary
        if: always()
        run: |
          {
            echo "## DVC pipeline run";
            echo "- Branch: ${{ github.ref_name }}";
            echo "- Region: $AWS_REGION";
            echo "- Steps: dvc pull → dvc repro → dvc push";
          } >> "$GITHUB_STEP_SUMMARY"